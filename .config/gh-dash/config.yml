prSections:
    - title: All Pull Requests
      filters: is:open
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
issuesSections:
    - title: All Issues
      filters: is:open
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Participating
      filters: reason:participating
    - title: Mentioned
      filters: reason:mention
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
    - title: Subscribed
      filters: reason:subscribed
    - title: Team Mentioned
      filters: reason:team-mention
repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60
defaults:
    preview:
        open: false
        width: 0.5
    prsLimit: 20
    prApproveComment: LGTM
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 15
keybindings:
  universal:
    - key: g
      name: lazygit
      command: >
        cd {{.RepoPath}}; lazygit
  prs:
    - key: K
      name: code review with octo
      command: >
        zellij action new-pane -n "{{.RepoName}} ({{.RepoPath}}) - PR #{{.PrNumber}} Code Review" --stacked -- nu -c "cd {{.RepoPath}};nvim -c \":silent Octo pr {{.PrNumber}}\""
    - key: C
      name: code review with AI
      command: >
        zellij action new-pane -n "{{.RepoName}} ({{.RepoPath}}) - PR #{{.PrNumber}}  Code Review" --stacked -- nu -c "cd {{.RepoPath}};opencode pr {{.PrNumber}}"
    - key: T
      name: view actions
      command: gh enhance -R {{.RepoName}} {{.PrNumber}}
  issues:
    - key: "P"
      name: pin issue
      command: >
        gh issue pin {{ .IssueNumber }} --repo {{ .RepoName }}
    - key: "U"
      name: unpin issue
      command: >
        gh issue unpin {{ .IssueNumber }} --repo {{ .RepoName }}
repoPaths:
  Sergih28/*: ~/Documents/projects/sergi/*
  Sergih28/zjstatus: ~/Documents/projects/other/*
  Sergih28/zellij-datetime: ~/Documents/projects/other/*
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
pager:
    diff: diffnav
confirmQuit: true
showAuthorIcons: true
smartFilteringAtLaunch: true
